name: Deploy Aiden AI Portal to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'portal/**'
      - 'Marketing/**'
      - '.github/workflows/azure-static-web-apps.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Assemble portal site (copy Marketing into portal/marketing)
        run: |
          rm -rf portal/marketing
          mkdir -p portal/marketing
          cp -r Marketing/. portal/marketing/
          # Rebuild the marketing hub index so it's fresh on every deploy
          if [ -f portal/marketing/build_index.py ]; then
            python3 portal/marketing/build_index.py || true
          fi
          ls -la portal

      - name: Deploy to Azure Static Web Apps
        id: swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: portal
          api_location: ''
          output_location: ''
          skip_app_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Preview
    steps:
      - name: Close PR preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
